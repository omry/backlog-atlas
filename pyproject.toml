[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "backlog-atlas"
version = "0.1.0"
description = "Generate a self-hosted backlog snapshot and dashboard for maintainers."
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
dependencies = [
    "omegaconf>=2.3",
]

[project.scripts]
backlog-atlas = "backlog_atlas.core:main"

[tool.setuptools.packages.find]
include = ["backlog_atlas*"]
namespaces = false

[tool.setuptools.package-data]
backlog_atlas = [
    "config.yaml",
    "templates/*.tmpl",
    "web/*",
]
